services:
  postgres:
    container_name: postgres_congreso
    image: 'postgres:latest'
    restart: unless-stopped
    environment:
      - 'POSTGRES_DB=ss2'
      - 'POSTGRES_PASSWORD=ss2-db'
      - 'POSTGRES_USER=ss2-root'
    ports:
      - '5433:5432'
    volumes:
      - pg_ss2_data:/data/postgres
volumes:
  pg_ss2_data: